# ArtsDiva IMS — full local stack: MongoDB (replica set) + backend + frontend.
#
#   docker compose up --build
#
# Services come up in order: mongo -> mongo-init (initiates the replica set) ->
# backend (runs `prisma db push`, then the API) -> frontend.

services:
  mongo:
    image: mongo:7
    container_name: artsdiva-mongo
    restart: unless-stopped
    # Prisma's MongoDB connector REQUIRES a replica set (for transactions).
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - artsdiva

  # One-shot: initialise the single-node replica set, then wait for a primary.
  mongo-init:
    image: mongo:7
    container_name: artsdiva-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongo:27017 --quiet --eval '
          try { rs.status(); print("replica set already initialised"); }
          catch (e) {
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo:27017" }] });
            print("replica set initiated");
          }
          var ready = false;
          for (var i = 0; i < 30 && !ready; i++) {
            try { ready = db.hello().isWritablePrimary; } catch (e) {}
            if (!ready) { sleep(1000); }
          }
          print(ready ? "primary ready" : "primary NOT ready after 30s");
        '
    networks:
      - artsdiva

  backend:
    build:
      context: ./artsdiva-backend
      dockerfile: Dockerfile
    container_name: artsdiva-backend
    restart: unless-stopped
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: "mongodb://mongo:27017/artsdiva?replicaSet=rs0"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-me}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      PORT: "4000"
      NODE_ENV: "production"
      CLIENT_ORIGIN: "http://localhost:3000"
    ports:
      - "4000:4000"
    networks:
      - artsdiva

  frontend:
    build:
      context: ./artsdiva-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:4000"
    container_name: artsdiva-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    networks:
      - artsdiva

volumes:
  mongo_data:

networks:
  artsdiva:
    driver: bridge
