name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # ─── 1. Build & type-check ────────────────────────────────────────────────
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm prisma validate
        # Catches schema syntax errors WITHOUT needing a live DB connection.
        # The actual db push runs at container start via docker-entrypoint.sh.

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: TypeScript build
        run: pnpm build

  # ─── 2. Docker image ──────────────────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    # Only build+push the image on pushes to main (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/artsdiva-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/artsdiva-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
