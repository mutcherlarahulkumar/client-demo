  <text x="1044" y="260" font-size="12" fill="#64748B">Year</text>
  <rect x="1044" y="268" width="172" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="1060" y="293" font-size="14" fill="#0F172A">2022</text>
  <!-- Acquisition Date + Status -->
  <text x="664" y="328" font-size="12" fill="#64748B">Acquisition Date</text>
  <rect x="664" y="336" width="356" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="680" y="361" font-size="14" fill="#0F172A">01 / 03 / 2022</text>
  <text x="1044" y="328" font-size="12" fill="#64748B">Status</text>
  <rect x="1044" y="336" width="360" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="1060" y="361" font-size="14" fill="#0F172A">In Collection</text>
  <text x="1380" y="361" font-size="10" fill="#94A3B8">▼</text>
  <!-- Notes -->
  <text x="664" y="396" font-size="12" fill="#64748B">Notes</text>
  <rect x="664" y="404" width="740" height="64" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="680" y="426" font-size="14" fill="#94A3B8">Internal notes...</text>

  <!-- CURRENT LEASE panel -->
  <text x="248" y="448" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.8">CURRENT LEASE</text>
  <rect x="248" y="460" width="380" height="88" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <rect x="268" y="476" width="84" height="22" rx="11" fill="#DBEAFE"/>
  <text x="280" y="491" font-size="11" font-weight="500" fill="#1D4ED8">ACTIVE</text>
  <text x="268" y="518" font-size="13" font-weight="600" fill="#0F172A">James Okoro</text>
  <text x="268" y="536" font-size="12" fill="#64748B">Since 01 Jan 2026  ·  £200 / month</text>

  <!-- LEASE HISTORY -->
  <text x="248" y="576" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.8">LEASE HISTORY</text>
  <rect x="248" y="588" width="380" height="32" fill="#F1F5F9"/>
  <text x="264" y="609" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.5">CLIENT</text>
  <text x="360" y="609" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.5">START</text>
  <text x="460" y="609" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.5">END</text>
  <text x="548" y="609" font-size="11" font-weight="700" fill="#64748B" letter-spacing="0.5">STATUS</text>
  <rect x="248" y="620" width="380" height="44" fill="#FFFFFF" stroke="#F1F5F9" stroke-width="1"/>
  <text x="264" y="647" font-size="13" fill="#0F172A">Tom Rivera</text>
  <text x="360" y="647" font-size="13" fill="#475569">Mar 2024</text>
  <text x="460" y="647" font-size="13" fill="#475569">Aug 2024</text>
  <rect x="548" y="632" width="76" height="20" rx="10" fill="#DCFCE7"/>
  <text x="558" y="646" font-size="11" fill="#16A34A">Completed</text>

  <!-- Screen label -->
  <rect x="248" y="840" width="252" height="28" rx="4" fill="#EEF2FF"/>
  <text x="264" y="859" font-size="11" font-weight="600" fill="#4F46E5">Screen 2B — Artwork Detail / Edit</text>
</svg>
